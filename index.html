<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Cocos Creator | toy-night-watch</title>

  <!--http://www.html5rocks.com/en/mobile/mobifying/-->
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>

  <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <!-- force webkit on 360 -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <!-- force edge on IE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <!-- force full screen on some browser -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>

  <!--fix fireball/issues/3568 -->
  <!--<meta name="browsermode" content="application">-->
  <meta name="x5-page-mode" content="app">

  <!--<link rel="apple-touch-icon" href=".png" />-->
  <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

  <link rel="stylesheet" type="text/css" href="style.css"/>

<style id="toy-night-boot-style">#toy-night-boot-status{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:28px;box-sizing:border-box;background:#17162d;color:#fff0be;font:600 18px/1.7 -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;text-align:center}#toy-night-boot-status small{display:block;margin-top:10px;color:#b8dfff;font-size:13px;font-weight:400}</style></head>
<body><div id="toy-night-boot-status" role="status"><div><div id="toy-night-boot-message">正在装配今晚的玩具……</div><small>首次打开需要加载美术和音效，请稍候</small></div></div><script>(function(){var box=document.getElementById('toy-night-boot-status'),msg=document.getElementById('toy-night-boot-message');function fail(text){if(box&&msg){msg.textContent=text;box.style.background='#21172d';}}window.addEventListener('error',function(e){fail('试玩版加载失败，请刷新页面后重试');});window.addEventListener('unhandledrejection',function(){fail('试玩版运行异常，请刷新页面后重试');});window.setTimeout(function(){if(document.getElementById('toy-night-boot-status'))fail('加载时间较长，请检查网络后刷新重试');},15000);})();</script>
  <div id="GameDiv" cc_exact_fit_screen="true">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
      </div>
    </div>
  

<!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.js" charset="utf-8"> </script>


<!-- SystemJS support. -->
<script src="src/system.bundle.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    System.import('./index.js').catch(function(err) { console.error(err); })
</script>

</body>
</html>
